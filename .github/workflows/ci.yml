name: Auction System CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      # Updated to v4 to fix the Node.js warning
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make libncurses5-dev libncursesw5-dev ipcrm

    - name: Compile Project
      run: make

    - name: Run Automated Test
      run: |
        echo "Starting Auction Test..."
        # We add '|| [ $? -eq 124 ]' or '|| true' to tell GitHub that 
        # being killed by timeout is NOT a failure.
        timeout 10s ./auction <<EOF || [ $? -eq 124 ]
        1
        TestProduct
        exit
        EOF
      
    - name: Check for history.log
      run: |
        if [ -f history.log ]; then
          echo "Success: Audit log was generated."
          # Display the last few lines of the log to prove bots were bidding
          tail -n 20 history.log
        else
          echo "Error: Logger failed to create history.log"
          exit 1
        fi
